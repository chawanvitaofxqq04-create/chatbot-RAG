version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: rag-postgres
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: ragdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/init_pgvector.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./backend/sql/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d ragdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rag-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-backend
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      DATABASE_URL: postgresql+psycopg2://app:app@db:5432/ragdb
      EMBED_MODEL: gemini-embedding-001
      CHAT_MODEL: gemini-2.5-flash
      EMBED_DIM: 768
      TOP_K: 5
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - rag-network
    restart: unless-stopped

volumes:
  pgdata:

networks:
  rag-network:
    driver: bridge
